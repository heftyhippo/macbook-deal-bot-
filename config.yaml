     ebay_query: "MacBook Pro 14 M3 Pro -case -cover -box -faulty -spares -repair -damaged"}
  - {id: m3pro-16,  chip: M3 PRO, size: 16, uk_avg_gbp: 1750, uk_used_gbp: 1255, base_spec: "18GB/512GB",
     ebay_query: "MacBook Pro 16 M3 Pro -case -cover -box -faulty -spares -repair -damaged"}
  - {id: m3max-14,  chip: M3 MAX, size: 14, uk_avg_gbp: 2200, uk_used_gbp: 1741, base_spec: "36GB/1TB",
