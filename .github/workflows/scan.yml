name: MacBook deal scan

# Runs the deal scan automatically on GitHub's servers - no need for your own
# computer to be on. Free for public repositories. Each run:
#   1. scans the markets and sends WhatsApp alerts for qualifying deals
#      (UK/US 35%+, JP 50%+ savings on landed cost by default);
#   2. publishes the dashboard to GitHub Pages, so you can check the latest
#      deals from any device at  https://<your-username>.github.io/<repo>/
on:
  schedule:
    # Every 20 minutes. (GitHub uses UTC and may delay a few minutes under load.)
    # Want a different cadence? Change the number: "*/30 * * * *" = every 30 min,
    # "0 * * * *" = once an hour. Don't go below 5 minutes.
    - cron: "*/20 * * * *"
  workflow_dispatch:   # adds a "Run workflow" button so you can test on demand

permissions:
  contents: read
  pages: write         # publish the dashboard to GitHub Pages
  id-token: write      # required by the Pages deploy action

# Never let two scans run at the same time.
concurrency:
  group: macdeals-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache the Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install the headless browser (for Buyee)
        run: python -m playwright install --with-deps chromium

      # The dedupe database lives in the Actions cache (NOT in git) so the
      # bot remembers what it already alerted between runs without filling
      # the repo's history with commits. Each run saves a fresh copy; the
      # restore step below picks up the most recent one.
      - name: Remember what was already alerted (restore)
        uses: actions/cache/restore@v4
        with:
          path: seen_items.db
          key: seen-items-${{ github.run_id }}
          restore-keys: seen-items-

      - name: Run the scan
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
          # Swappa can't run in the cloud (needs a real Chrome on a home
          # connection), so it's excluded here; your local scans cover it.
          # Override with a repository Variable named SOURCES (e.g.
          # "mercari,ebay_uk,ebay_us") if Buyee blocks GitHub's servers and
          # you want to silence the failing sources.
          SOURCES: ${{ vars.SOURCES || 'mercari,ebay_uk,ebay_us,yahoo,rakuma' }}
        run: python macdeals.py scan
        continue-on-error: true   # a bad scan shouldn't kill the schedule

      - name: Remember what was already alerted (save)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_items.db
          key: seen-items-${{ github.run_id }}

      # ---- publish the dashboard to GitHub Pages ----
      # If the scan crashed before writing deals.html, skip the deploy so the
      # previous (good) dashboard stays online.
      - name: Collect the dashboard
        id: collect
        run: |
          if [ -f deals.html ]; then
            mkdir -p site && cp deals.html site/index.html
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "no deals.html this run - keeping the previous dashboard"
          fi

      - name: Configure Pages
        if: steps.collect.outputs.ok == 'true'
        uses: actions/configure-pages@v5

      - name: Upload the dashboard
        if: steps.collect.outputs.ok == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.collect.outputs.ok == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
